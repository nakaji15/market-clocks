<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Market Dashboard - Final Edition</title>
    <style>
        /* 背景色をTradingViewのダークモードに統一 */
        body { 
            background-color: #131722; 
            color: #d1d4dc; 
            margin: 0; 
            padding: 20px; 
            font-family: -apple-system, BlinkMacSystemFont, "Trebuchet MS", Roboto, Ubuntu, sans-serif;
        }
        .main-container { 
            display: flex; 
            gap: 20px; 
            max-width: 1200px;
            margin: 0 auto;
            justify-content: center;
        }
        /* 左側：MARKET INDEX パネル */
        .market-panel { 
            flex: 0 0 640px; 
        }
        /* 右側：WORLD CLOCK パネル */
        .clock-panel { 
            flex: 0 0 280px; 
            background-color: #1e222d; 
            padding: 20px; 
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .clock-item {
            text-align: center;
            border-bottom: 1px solid #363c4e;
            padding-bottom: 15px;
        }
        .clock-item:last-child { border-bottom: none; }
        
        h2 {
            font-size: 16px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            color: #787b86;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="market-panel">
        <h2>MARKET INDEX</h2>
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
            {
              "colorTheme": "dark",
              "dateRange": "12M",
              "showChart": true,
              "locale": "ja",
              "width": 640,
              "height": 700,
              "largeChartUrl": "",
              "isTransparent": false,
              "showSymbolLogo": true,
              "showFloatingTooltip": false,
              "plotLineColorGrowing": "rgba(242, 54, 69, 1)",
              "plotLineColorFalling": "rgba(56, 142, 60, 1)",
              "gridLineColor": "rgba(156, 156, 156, 0)",
              "scaleFontColor": "#DBDBDB",
              "belowLineFillColorGrowing": "rgba(41, 98, 255, 0.12)",
              "belowLineFillColorFalling": "rgba(41, 98, 255, 0.12)",
              "belowLineFillColorGrowingBottom": "rgba(41, 98, 255, 0)",
              "belowLineFillColorFallingBottom": "rgba(41, 98, 255, 0)",
              "symbolActiveColor": "rgba(41, 98, 255, 0.12)",
              "tabs": [
                {
                  "title": "watchlist",
                  "symbols": [
                    { "s": "INDEX:NKY", "d": "日経225" },
                    { "s": "IG:TOPIX", "d": "TOPIX" },
                    { "s": "CAPITALCOM:US500", "d": "S＆P 500" },
                    { "s": "CAPITALCOM:US100", "d": "ナスダック" },
                    { "s": "CAPITALCOM:US30", "d": "NYダウ" },
                    { "s": "FX:USDJPY", "d": "米ドル／円" },
                    { "s": "TICKMILL:EURJPY", "d": "ユーロ／円" },
                    { "s": "FX_IDC:AEDJPY", "d": "UEAディルハム／円" },
                    { "s": "BITFLYER:BTCJPY", "d": "ビットコイン／円" },
                    { "s": "PYTH:XAUUSD", "d": "金" },
                    { "s": "BLACKBULL:WTI", "d": "原油" }
                  ]
                }
              ]
            }
            </script>
        </div>
    </div>

    <div class="clock-panel">
        <h2>WORLD CLOCK</h2>
        
        <div class="clock-item">
            <iframe src="https://www.24timezones.com/get_widget.php?size=150&language=ja&timezone=Asia/Tokyo&caption=東京" width="150" height="82" frameborder="0" scrolling="no"></iframe>
        </div>
        
        <div class="clock-item">
            <iframe src="https://www.24timezones.com/get_widget.php?size=150&language=ja&timezone=America/New_York&caption=ニューヨーク" width="150" height="82" frameborder="0" scrolling="no"></iframe>
        </div>
        
        <div class="clock-item">
            <iframe src="https://www.24timezones.com/get_widget.php?size=150&language=ja&timezone=America/Los_Angeles&caption=ロサンゼルス" width="150" height="82" frameborder="0" scrolling="no"></iframe>
        </div>
        
        <div class="clock-item">
            <iframe src="https://www.24timezones.com/get_widget.php?size=150&language=ja&timezone=Europe/London&caption=ロンドン" width="150" height="82" frameborder="0" scrolling="no"></iframe>
        </div>
        
        <div class="clock-item">
            <iframe src="https://www.24timezones.com/get_widget.php?size=150&language=ja&timezone=Australia/Sydney&caption=シドニー" width="150" height="82" frameborder="0" scrolling="no"></iframe>
        </div>
        
        <div class="clock-item">
            <iframe src="https://www.24timezones.com/get_widget.php?size=150&language=ja&timezone=Asia/Shanghai&caption=北京" width="150" height="82" frameborder="0" scrolling="no"></iframe>
        </div>

    </div>
</div>

</body>
</html>
